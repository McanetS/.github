name: Update org README

on:
  schedule:
    - cron: '0 6 * * 1'   # cada lunes 6 AM UTC
  workflow_dispatch:        # disparo manual desde GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Regenerar stats
        env:
          # Requiere un PAT con scope "repo" guardado como secreto de org:
          #   GitHub → McanetS → Settings → Secrets → Actions → ORG_TOKEN
          # El GITHUB_TOKEN por defecto solo tiene acceso a este repo (.github).
          GITHUB_TOKEN: ${{ secrets.ORG_TOKEN || secrets.GITHUB_TOKEN }}
        run: python .github/scripts/update_readme.py

      - name: Commit si hubo cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git diff --staged --quiet || git commit -m "chore: update org stats [skip ci]"
          git push
